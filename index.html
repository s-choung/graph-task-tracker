  ctx.style.top=Math.max(8,Math.min(ev.clientY,innerHeight-Math.min(360,60+cands.length*30)))+'px';
  ctx.style.maxHeight='60vh'; ctx.style.overflowY='auto';
  ctx.querySelectorAll('button').forEach(b=>b.onclick=()=>{ ctx.style.display='none'; ctx.style.maxHeight=''; setProjectParent(name, b.dataset.p||null); });
}
function deleteProject(name){
  const ns=db.nodes.filter(n=>(n.project||'기타')===name);
  if(!confirm(`'${name}' 프로젝트를 삭제할까요?\n카드/메모 ${ns.length}개도 함께 삭제되며 완료함(삭제)에 기록됩니다.`)) return;
  markUndo();
  ns.forEach(archiveNode);
  const del=new Set(ns.map(n=>n.id));
  db.nodes=db.nodes.filter(n=>!del.has(n.id));
  db.edges=db.edges.filter(e=>!del.has(e.from)&&!del.has(e.to));
  del.forEach(id=>delete db.pos[id]);
  db.extraProjects=(db.extraProjects||[]).filter(p=>p!==name);
  if(db.projectMeta) delete db.projectMeta[name];
  if(SEED.projects.includes(name)){ (db.hidden=db.hidden||[]).push(name); }
  if(project===name){ project=projectList()[0]||''; }
  selNodes.clear(); selectedId=null; if(panel.classList.contains('open')) panel.classList.remove('open');
  persist(); renderSidebar(); renderProjectBar();
  view==='list'?renderList():layout();
  showToast(`'${name}' 삭제됨`);
}
document.getElementById('sbCollapse').onclick=()=>{ document.body.classList.add('sb-collapsed'); setTimeout(()=>{ if(view==='graph') renderEdges(); },200); };
document.getElementById('sbReopen').onclick=()=>{ document.body.classList.remove('sb-collapsed'); setTimeout(()=>{ if(view==='graph') renderEdges(); },200); };
// resizable sidebar: drag the divider on its right edge
(function(){
  const rz=document.getElementById('sbResize'); if(!rz) return;
  const setW=w=>document.documentElement.style.setProperty('--sidebar-w', w+'px');
  const saved=parseInt(localStorage.getItem('gdash-sbw')||'',10);
  if(saved>=160 && saved<=480) setW(saved);
  rz.addEventListener('mousedown',e=>{ e.preventDefault(); rz.classList.add('dragging'); document.body.style.userSelect='none';
    function mm(ev){ setW(Math.max(160,Math.min(480,ev.clientX))); }
    function mu(ev){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu);
      rz.classList.remove('dragging'); document.body.style.userSelect='';
      const w=Math.max(160,Math.min(480,ev.clientX)); localStorage.setItem('gdash-sbw',w); if(view==='graph') renderEdges(); }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
})();

document.getElementById('btnArrange').onclick=()=>{
  projectNodes().forEach(n=>delete db.pos[n.id]); persist(); layout(); fitView();
};
document.getElementById('sweepBtn').onclick=sweepDone;

/* =========================================================================
   PAN / ZOOM / DOUBLE-CLICK CREATE
   ========================================================================= */
// clickable tool toggle: default empty-canvas drag = marquee-select or pan (trackpad-friendly)
let toolMode = localStorage.getItem('gdash-tool')==='pan' ? 'pan' : 'select';
const toolModeEl=document.getElementById('toolMode');
function setToolMode(m){
  toolMode=m; localStorage.setItem('gdash-tool',m);
  viewport.classList.toggle('tool-pan',m==='pan');
  toolModeEl.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
}
toolModeEl.querySelectorAll('button').forEach(b=>b.onclick=()=>setToolMode(b.dataset.m));
setToolMode(toolMode);
document.addEventListener('keydown',e=>{
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  const t=e.target; if(t&&(t.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return;
  const key=e.key.toLowerCase();
  if(key==='v') setToolMode('select'); else if(key==='h') setToolMode('pan');
});
// hold Space to pan instead of marquee-select
let spaceDown=false;
document.addEventListener('keydown',e=>{ if(e.code==='Space'){ const t=e.target; if(t&&(t.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))) return; spaceDown=true; if(view==='graph') viewport.style.cursor='grab'; } });
document.addEventListener('keyup',e=>{ if(e.code==='Space'){ spaceDown=false; viewport.style.cursor=''; } });
window.addEventListener('blur',()=>{ spaceDown=false; viewport.style.cursor=''; });
viewport.addEventListener('mousedown',e=>{
  const onEmpty = (e.target===viewport || e.target===world || e.target===svg);
  if(!onEmpty) return;
  if(e.button===1 || (e.button===0 && (spaceDown || (toolMode==='pan' && !e.shiftKey)))){ startPan(e); return; }   // middle-drag / Space+drag / pan-mode drag → pan
  if(e.button!==0) return;
  deselectEdge();
  startMarquee(e);                                                          // select-mode left-drag (or Shift+drag in pan mode) → rubber-band select
});
function startPan(e){
  e.preventDefault();
  const start={x:e.clientX,y:e.clientY,tx,ty};
  viewport.classList.add('panning');
  function mm(ev){ tx=start.tx+(ev.clientX-start.x); ty=start.ty+(ev.clientY-start.y); applyTransform(); }
  function mu(){ document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);viewport.classList.remove('panning'); }
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
function startMarquee(e){
  const additive=e.shiftKey;
  const base=additive?new Set(selNodes):new Set();
  if(!additive){ selNodes=new Set(); selectedId=null; if(panel.classList.contains('open')) panel.classList.remove('open'); applySelClasses(); }
  const s={x:e.clientX,y:e.clientY};
  const r=viewport.getBoundingClientRect();
  const box=document.createElement('div'); box.className='marquee'; viewport.appendChild(box);
  function mm(ev){
    const x1=Math.min(s.x,ev.clientX), y1=Math.min(s.y,ev.clientY), x2=Math.max(s.x,ev.clientX), y2=Math.max(s.y,ev.clientY);
    box.style.left=(x1-r.left)+'px'; box.style.top=(y1-r.top)+'px'; box.style.width=(x2-x1)+'px'; box.style.height=(y2-y1)+'px';
    const w1=screenToWorld(x1,y1), w2=screenToWorld(x2,y2);
    const hit=new Set(base);
    projectNodes().forEach(n=>{ if(n._x==null||!sizes[n.id]) return;
      if(n._x < w2.x && n._x+sizes[n.id].w > w1.x && n._y < w2.y && n._y+sizes[n.id].h > w1.y) hit.add(n.id); });
    selNodes=hit; selectedId=null; applySelClasses();
  }
  function mu(){ document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu); box.remove(); }
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
viewport.addEventListener('wheel',e=>{
  e.preventDefault();
  // pan mode: two-finger scroll pans; pinch (ctrlKey) still zooms. select mode: wheel = zoom (legacy)
  if(toolMode==='pan' && !e.ctrlKey && !e.metaKey){ tx-=e.deltaX; ty-=e.deltaY; applyTransform(); return; }
  const r=viewport.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const factor=e.ctrlKey ? Math.exp(-Math.max(-30,Math.min(30,e.deltaY))*.01)   // pinch gesture → smooth zoom
                         : (e.deltaY<0?1.1:1/1.1);
  const k2=Math.min(2.2,Math.max(.3,k*factor));
  tx=mx-(mx-tx)*(k2/k); ty=my-(my-ty)*(k2/k); k=k2; applyTransform();
},{passive:false});
viewport.addEventListener('dblclick',e=>{
  if(e.target!==viewport && e.target!==world && e.target!==svg) return;
  openCreateChooser(e.clientX,e.clientY);
});
// double-click empty canvas → pick what to drop here (card task vs free text note)
function openCreateChooser(cx,cy){
  const w=screenToWorld(cx,cy);
  ctx.innerHTML=`
    <div class="mlabel">여기에 만들기</div>
    <button data-a="card">＋ 카드 (작업)</button>
    <button data-a="text">＋ 텍스트 (메모)</button>`;
  ctx.style.display='block';
  ctx.style.left=Math.min(cx,innerWidth-190)+'px';
  ctx.style.top=Math.min(cy,innerHeight-120)+'px';
  ctx.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    if(b.dataset.a==='card') createCard(w); else createText(w);
    ctx.style.display='none';
  });
}
function focusNew(nid){ setTimeout(()=>{ const el=nodesLayer.querySelector(`.node[data-id="${CSS.escape(nid)}"]`); if(el) editTitle(nid,el); },30); }
function createCard(w){
  markUndo();
  const nid='#'+(++nextLocalNum);
  db.nodes.push({id:nid,title:'새 작업',desc:'',priority:0,priorityLabel:'No priority',
    due:null,state:'Todo',project,children:[],assignees:[{id:'me',type:'me'}],created:todayStr()});
  db.pos[nid]={x:w.x-NODE_W/2,y:w.y-55};
  persist(); layout(); renderSidebar(); focusNew(nid);
}
function createText(w){
  markUndo();
  const nid='#'+(++nextLocalNum);
  db.nodes.push({id:nid,kind:'text',text:'',project,created:todayStr()});
  db.pos[nid]={x:w.x-70,y:w.y-18};
  persist(); layout(); renderSidebar(); focusNew(nid);
}

function fitView(){
  const ns=projectNodes(); if(!ns.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  ns.forEach(n=>{ minX=Math.min(minX,n._x);minY=Math.min(minY,n._y);
    maxX=Math.max(maxX,n._x+sizes[n.id].w);maxY=Math.max(maxY,n._y+sizes[n.id].h); });
  const r=viewport.getBoundingClientRect();
  const pad=60;
  k=Math.min(1.1,(r.width-pad*2)/(maxX-minX),(r.height-pad*2)/(maxY-minY));
  k=Math.max(.3,k);
  tx=pad-minX*k + (r.width-pad*2-(maxX-minX)*k)/2;
  ty=pad-minY*k + (r.height-pad*2-(maxY-minY)*k)/2;
  applyTransform();
}

// ---- boot ----
// one-time init: seed the subproject hierarchy from SEED.projectMeta (parent map). Runs once (db.seeded).
function applyOneTimeSeeds(){
  if(db.seeded) return; db.seeded=true;
  ensureProjectMeta();
  if(window.SEED && SEED.projectMeta){ Object.entries(SEED.projectMeta).forEach(([p,m])=>{ if(m && m.parent && db.projectMeta[p]) db.projectMeta[p].parent=m.parent; }); }
  saveLocal();
  if(!projectList().includes(project)) project=projectList()[0]||project;
  openAncestors(project); renderSidebar(); renderProjectBar();
  view==='list'?renderList():layout(); if(view==='graph') fitView();
}
// 구버전 마이그레이션: swept 플래그가 없는 Done 카드는 옛 메커니즘에서 이미 보드에서 치워졌던 것 → swept 처리 (보드 범람 방지)
function sweepLegacyDone(){ (db.nodes||[]).forEach(n=>{ if(n.state==='Done' && n.swept===undefined) n.swept=true; }); }
sweepLegacyDone();
applyOneTimeSeeds();
// deep-link: ?p=<projectIndex or name>  &view=graph|list
const qp=new URLSearchParams(location.search);
if(qp.has('p')){ const v=qp.get('p'); const byIdx=SEED.projects[+v]; project=byIdx||(projectList().includes(v)?v:project); }
if(!projectList().includes(project)) project=projectList()[0]||project;
openAncestors(project);
renderSidebar();
renderProjectBar();
applyTransform();
layout();
fitView();
if(qp.get('view')==='list') setView('list');
if(qp.has('sel')) openPanel(qp.get('sel'));
// re-measure once fonts settle so card heights (and dagre packing) don't jump on the first re-layout
function _enableLayoutPin(){ if(_layoutPin) return; _layoutPin=true; if(view==='graph'){ layout(); fitView(); } }   // 폰트 로드 후 올바른 크기로 재배치하고 그때부터 위치 고정
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(_enableLayoutPin); } else { _enableLayoutPin(); }
setTimeout(_enableLayoutPin, 1500);   // 폰트 API 미지원/지연 대비 안전장치
window.addEventListener('resize',()=>{ if(view==='graph') renderEdges(); });

/* ---- local-only build: persistence = browser localStorage (no cloud sync) ---- */
function scheduleSync(){}
function showToast(msg){ const t=document.getElementById('toast'); if(!t) return; t.textContent=msg||'저장됨'; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1700); }
// pin every visible node's exact position so the saved layout reloads identically
function snapshotPositions(){ projectNodes().forEach(n=>{ if(n._x!=null && sizes[n.id]) db.pos[n.id]={x:n._x,y:n._y}; }); }
function doSave(){ snapshotPositions(); persist(); showToast('저장됨 (로컬)'); }
document.getElementById('btnSave').onclick=doSave;
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='s'){ e.preventDefault(); doSave(); } });
</script>
